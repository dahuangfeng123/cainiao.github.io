<script type="module">
  import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.2";

  let translator = null;

  window.translateText = async function() {
    const inputEl = document.getElementById('input');
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const text = inputEl.value.trim();
    
    if (!text) { alert("请输入英文文本！"); return; }

    if (!translator) {
      statusEl.textContent = "首次加载翻译模型，请耐心等待...";
      try {
        translator = await pipeline('translation_en_to_zh', 'Xenova/opus-mt-en-zh', {
          quantized: true,
        });
        statusEl.textContent = "✅ 模型加载完成！";
      } catch (err) {
        statusEl.textContent = "❌ 模型加载失败: " + err.message;
        return;
      }
    }

    statusEl.textContent = "正在翻译...";
    try {
      const result = await translator(text);
      outputEl.innerHTML = `<strong>翻译结果：</strong><br>${result[0].translation_text}`;
      statusEl.textContent = "✅ 翻译完成";
    } catch (err) {
      statusEl.textContent = "❌ 翻译出错：" + err.message;
    }
  };
</script>
