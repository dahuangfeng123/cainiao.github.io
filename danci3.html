<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>层层递进 · 单词复习工具 | 同学A & 同学B</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%);
            font-family: 'Segoe UI', 'Roboto', 'Noto Sans', system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        /* 主容器 */
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ========= 头部学生切换卡 ========= */
        .student-header {
            background: white;
            border-radius: 60px;
            padding: 8px 20px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(2px);
        }

        .student-buttons {
            display: flex;
            gap: 16px;
        }

        .student-btn {
            border: none;
            background: #f1f5f9;
            padding: 10px 32px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1e293b;
            letter-spacing: 1px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .student-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 6px 14px rgba(59,130,246,0.3);
        }

        .student-btn:first-child.active {
            background: #f97316;
            box-shadow: 0 6px 14px rgba(249,115,22,0.3);
        }

        .student-btn:last-child.active {
            background: #8b5cf6;
            box-shadow: 0 6px 14px rgba(139,92,246,0.3);
        }

        .stats-badge {
            background: #f8fafc;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 500;
            color: #0f172a;
            font-size: 0.9rem;
            display: flex;
            gap: 20px;
        }

        .stats-badge span {
            font-weight: 700;
            color: #3b82f6;
        }

        /* 双栏布局 */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        /* 左侧复习卡片区 */
        .review-area {
            flex: 2;
            min-width: 280px;
        }

        /* 右侧单词库管理区 */
        .wordbank-area {
            flex: 1.4;
            min-width: 280px;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s;
        }

        .review-card {
            background: linear-gradient(135deg, #ffffff 0%, #fef9f0 100%);
            border: 1px solid rgba(255,215,150,0.5);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px dashed #ffe2b5;
            padding-bottom: 12px;
        }

        .level-badge {
            background: #fef3c7;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #b45309;
        }

        .word-en {
            font-size: 3.2rem;
            font-weight: 800;
            text-align: center;
            letter-spacing: 1px;
            color: #1e293b;
            margin: 25px 0 15px;
            word-break: break-word;
        }

        .answer-section {
            background: #f1f5f9;
            border-radius: 28px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            transition: all 0.2s;
        }

        .answer-hidden {
            color: #64748b;
            font-size: 1.15rem;
            font-weight: 500;
        }

        .answer-visible {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e66;
            background: #ffffffd0;
            padding: 12px;
            border-radius: 32px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            background: #eef2ff;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: scale(0.97);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-warning {
            background: #f97316;
            color: white;
        }

        .btn-outline {
            background: white;
            border: 1px solid #cbd5e1;
        }

        button:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        /* 单词表格样式 */
        .word-list {
            max-height: 450px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .word-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f9fafb;
            margin: 8px 0;
            padding: 8px 14px;
            border-radius: 60px;
            transition: 0.1s;
        }

        .word-info {
            flex: 3;
            font-weight: 500;
        }

        .word-level {
            font-size: 0.75rem;
            background: #e2e8f0;
            padding: 4px 8px;
            border-radius: 30px;
            min-width: 60px;
            text-align: center;
            margin: 0 8px;
        }

        .level-0 { background: #fee2e2; color:#b91c1c; }
        .level-1 { background: #ffedd5; color:#9a3412; }
        .level-2 { background: #dcfce7; color:#166534; }
        .level-3 { background: #d9f99d; color:#3f6212; font-weight: bold;}

        .word-actions button {
            padding: 4px 12px;
            font-size: 0.7rem;
            margin-left: 6px;
        }

        .add-word-form {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .add-word-form input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            font-size: 0.9rem;
            outline: none;
        }

        .reset-progress {
            margin-top: 16px;
            text-align: right;
        }

        h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        hr {
            margin: 12px 0;
            border-color: #e9eef3;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #5b677b;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            color: #6c7a91;
        }

        @media (max-width: 780px) {
            .word-en {
                font-size: 2.2rem;
            }
            .student-header {
                flex-direction: column;
                gap: 12px;
                border-radius: 30px;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 头部学生切换区 -->
    <div class="student-header">
        <div class="student-buttons">
            <button class="student-btn" data-student="A">🧑‍🎓 同学A · 小勇士</button>
            <button class="student-btn" data-student="B">👩‍🎓 同学B · 智慧星</button>
        </div>
        <div class="stats-badge" id="statsDisplay">
            📊 总单词: <span id="totalWords">0</span> &nbsp;|&nbsp; ✅ 已掌握(3级): <span id="masteredCount">0</span>
        </div>
    </div>

    <div class="dashboard">
        <!-- 左侧 层层递进复习卡片 -->
        <div class="review-area">
            <div class="card review-card" id="reviewCard">
                <div class="review-header">
                    <span class="level-badge" id="currentLevelTag">🌟 当前等级: 0</span>
                    <span id="progressHint" style="font-size:0.7rem; color:#f97316;">✨ 答对升级，答错降级</span>
                </div>
                <div id="reviewContent">
                    <!-- 动态填充卡片内容 -->
                </div>
            </div>
            <div class="card" style="background:#fefce8;">
                <h3>📖 层层递进小贴士</h3>
                <p style="font-size:0.9rem; margin-top:6px;">✅ 每个单词有 <strong>0(生词) → 1(初识) → 2(渐熟) → 3(掌握)</strong> 四个层次。<br>
                🔁 复习时先看英文 → 回想中文 → 诚实自评「正确/错误」，系统自动递进升降级。<br>
                🎯 只有反复正确，才能达到3级“掌握之星”，彻底记住单词！</p>
            </div>
        </div>

        <!-- 右侧 单词库 & 进度管理 -->
        <div class="wordbank-area">
            <div class="card">
                <h3>📚 单词宝库</h3>
                <div class="add-word-form">
                    <input type="text" id="newEnWord" placeholder="英文单词, e.g. elephant" autocomplete="off">
                    <input type="text" id="newZhWord" placeholder="中文释义, e.g. 大象">
                    <button id="addWordBtn" class="btn-primary">➕ 添加</button>
                </div>
                <div class="word-list" id="wordListContainer">
                    <!-- 动态单词列表 + 等级显示 -->
                </div>
                <div class="reset-progress">
                    <button id="resetCurrentStudentBtn" class="btn-outline" style="background:#fff0e6;">🔄 重置当前学生全部进度</button>
                </div>
            </div>
        </div>
    </div>
    <footer>⚡ 独立进度 · 递进式复习 | 数据自动保存至浏览器</footer>
</div>

<script>
    // ----------------------------- 数据结构设计 ---------------------------------
    // 单词库: [{ id, en, zh }]
    // 学生进度: studentAProgress: { wordId: level (0-3) }, studentBProgress 同理
    // 采用 localStorage 持久化

    const STORAGE_WORDS = 'vocabMaster_words';
    const STORAGE_PROGRESS_A = 'vocabMaster_progress_A';
    const STORAGE_PROGRESS_B = 'vocabMaster_progress_B';

    // 默认单词库 (小学基础)
    const DEFAULT_WORDS = [
        { id: 'w1', en: 'apple', zh: '苹果' },
        { id: 'w2', en: 'bird', zh: '鸟' },
        { id: 'w3', en: 'happy', zh: '快乐的' },
        { id: 'w4', en: 'big', zh: '大的' },
        { id: 'w5', en: 'teacher', zh: '老师' },
        { id: 'w6', en: 'mother', zh: '母亲' },
        { id: 'w7', en: 'run', zh: '跑' },
        { id: 'w8', en: 'blue', zh: '蓝色' },
        { id: 'w9', en: 'cat', zh: '猫' },
        { id: 'w10', en: 'school', zh: '学校' }
    ];

    // 全局状态
    let currentStudent = 'A';      // 'A' or 'B'
    let words = [];                // 单词数组
    let progress = {};            // 当前学生的进度 { wordId: level }

    // ---------- 辅助函数 ----------
    function loadWords() {
        const stored = localStorage.getItem(STORAGE_WORDS);
        if (stored) {
            words = JSON.parse(stored);
        } else {
            words = [...DEFAULT_WORDS];
            saveWords();
        }
    }

    function saveWords() {
        localStorage.setItem(STORAGE_WORDS, JSON.stringify(words));
    }

    // 加载指定学生的进度 (并确保每个单词都有进度记录)
    function loadProgressForStudent(student) {
        let storedProgress = null;
        if (student === 'A') {
            storedProgress = localStorage.getItem(STORAGE_PROGRESS_A);
        } else {
            storedProgress = localStorage.getItem(STORAGE_PROGRESS_B);
        }

        let loaded = {};
        if (storedProgress) {
            loaded = JSON.parse(storedProgress);
        }

        // 补全缺失单词的默认等级0 (保证每个单词都有记录)
        const newProgress = {};
        words.forEach(word => {
            if (loaded[word.id] !== undefined && loaded[word.id] >= 0 && loaded[word.id] <= 3) {
                newProgress[word.id] = loaded[word.id];
            } else {
                newProgress[word.id] = 0;   // 新单词初始0级
            }
        });
        progress = newProgress;
        // 同时保存补全后的进度
        saveProgressForStudent(student);
        return progress;
    }

    function saveProgressForStudent(student) {
        if (student === 'A') {
            localStorage.setItem(STORAGE_PROGRESS_A, JSON.stringify(progress));
        } else {
            localStorage.setItem(STORAGE_PROGRESS_B, JSON.stringify(progress));
        }
    }

    // 切换学生时重新加载进度 & 刷新UI
    function switchStudent(student) {
        currentStudent = student;
        // 重新加载当前学生的进度
        loadProgressForStudent(currentStudent);
        renderAll();
        // 高亮按钮样式
        document.querySelectorAll('.student-btn').forEach(btn => {
            if (btn.getAttribute('data-student') === student) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // 更新某个单词的等级 (递进核心)
    function updateWordLevel(wordId, isCorrect) {
        const oldLevel = progress[wordId];
        if (oldLevel === undefined) {
            progress[wordId] = 0;
        }
        let newLevel = oldLevel;
        if (isCorrect) {
            // 正确则升级，最高3级
            newLevel = Math.min(oldLevel + 1, 3);
        } else {
            // 错误则降级，最低0级
            newLevel = Math.max(oldLevel - 1, 0);
        }
        if (newLevel !== oldLevel) {
            progress[wordId] = newLevel;
            saveProgressForStudent(currentStudent);
        }
        return newLevel;
    }

    // 获取当前学生“未掌握”的单词 (等级<3)，构成复习队列，按等级升序（先复习低级）
    function getReviewQueue() {
        const queue = [];
        words.forEach(word => {
            const level = progress[word.id] ?? 0;
            if (level < 3) {
                queue.push({ ...word, level });
            }
        });
        // 排序：等级低的在前（0级最先），帮助层层递进
        queue.sort((a, b) => a.level - b.level);
        return queue;
    }

    // 渲染复习卡片区 (显示当前待复习单词)
    let currentReviewWordIndex = 0;
    let currentReviewQueue = [];

    function refreshReviewQueue() {
        currentReviewQueue = getReviewQueue();
        currentReviewWordIndex = 0;
    }

    // 获取当前复习单词对象 (没有复习单词则返回null)
    function getCurrentReviewWord() {
        if (currentReviewQueue.length === 0) return null;
        if (currentReviewWordIndex >= currentReviewQueue.length) {
            currentReviewWordIndex = 0;
        }
        return currentReviewQueue[currentReviewWordIndex];
    }

    // 展示复习卡片UI (带正确/错误按钮，显示答案逻辑)
    let showAnswerFlag = false;   // 是否显示答案

    function renderReviewCard() {
        const reviewContainer = document.getElementById('reviewContent');
        if (!reviewContainer) return;

        const wordObj = getCurrentReviewWord();
        if (!wordObj) {
            // 所有单词都已掌握(等级3)
            reviewContainer.innerHTML = `
                <div class="empty-message">
                    🎉 太棒啦！当前学生所有单词都已达到「掌握」等级！ 🎉<br>
                    🌟 可以添加新单词或重置进度继续挑战 🌟
                </div>
            `;
            document.getElementById('currentLevelTag').innerText = `🏆 完美掌握 🏆`;
            return;
        }

        const currentLevel = progress[wordObj.id] ?? 0;
        const levelText = ['🌱 生词', '📘 初识', '⭐ 渐熟', '💎 掌握'][currentLevel] || '等级' + currentLevel;
        document.getElementById('currentLevelTag').innerHTML = `📌 ${levelText}  (等级 ${currentLevel}/3)`;

        // 决定显示答案区域状态
        let answerHtml = '';
        if (showAnswerFlag) {
            answerHtml = `<div class="answer-visible">🔊 ${wordObj.zh}</div>`;
        } else {
            answerHtml = `<div class="answer-hidden">❓ 点击「显示答案」回想释义 ❓</div>`;
        }

        const html = `
            <div class="word-en">${wordObj.en}</div>
            <div class="answer-section" id="answerSection">
                ${answerHtml}
            </div>
            <div class="btn-group">
                <button id="revealAnswerBtn" class="btn-outline">🔎 显示答案</button>
                <button id="correctBtn" class="btn-success" ${!showAnswerFlag ? 'disabled style="opacity:0.5"' : ''}>✅ 正确 (升级)</button>
                <button id="wrongBtn" class="btn-danger" ${!showAnswerFlag ? 'disabled style="opacity:0.5"' : ''}>❌ 错误 (降级)</button>
            </div>
            <div class="btn-group">
                <button id="nextWordBtn" class="btn-primary">⏩ 跳过 / 下一个单词</button>
            </div>
            <div style="font-size:0.7rem; text-align:center; margin-top:12px;">✨ 先想中文 → 显示答案 → 诚实自评 → 单词自动升降级 ✨</div>
        `;
        reviewContainer.innerHTML = html;

        // 绑定事件
        const revealBtn = document.getElementById('revealAnswerBtn');
        const correctBtn = document.getElementById('correctBtn');
        const wrongBtn = document.getElementById('wrongBtn');
        const nextBtn = document.getElementById('nextWordBtn');

        if (revealBtn) {
            revealBtn.onclick = () => {
                showAnswerFlag = true;
                renderReviewCard();  // 刷新显示答案并启用正确/错误按钮
            };
        }

        if (correctBtn) {
            correctBtn.onclick = () => {
                if (!showAnswerFlag) return;
                // 处理正确升级
                updateWordLevel(wordObj.id, true);
                // 重置答案显示状态
                showAnswerFlag = false;
                // 刷新复习队列（等级变化）
                refreshReviewQueue();
                // 重新渲染
                renderReviewCard();
                renderWordList();      // 刷新单词列表等级
                renderStats();         // 刷新统计
            };
        }

        if (wrongBtn) {
            wrongBtn.onclick = () => {
                if (!showAnswerFlag) return;
                updateWordLevel(wordObj.id, false);
                showAnswerFlag = false;
                refreshReviewQueue();
                renderReviewCard();
                renderWordList();
                renderStats();
            };
        }

        if (nextBtn) {
            nextBtn.onclick = () => {
                // 跳过当前单词，移到队列下一个，且不清除答案显示状态
                if (currentReviewQueue.length > 0) {
                    currentReviewWordIndex++;
                    if (currentReviewWordIndex >= currentReviewQueue.length) {
                        currentReviewWordIndex = 0;
                    }
                    showAnswerFlag = false;   // 切换单词后隐藏答案
                    renderReviewCard();
                } else {
                    refreshReviewQueue();
                    renderReviewCard();
                }
            };
        }
    }

    // 渲染右侧单词列表，显示每个单词的等级 + 快捷操作（单独升降/删除）
    function renderWordList() {
        const container = document.getElementById('wordListContainer');
        if (!container) return;
        if (words.length === 0) {
            container.innerHTML = `<div class="empty-message">📭 暂无单词，请添加新单词~</div>`;
            return;
        }

        let html = '';
        words.forEach(word => {
            const level = progress[word.id] ?? 0;
            let levelClass = '';
            if (level === 0) levelClass = 'level-0';
            else if (level === 1) levelClass = 'level-1';
            else if (level === 2) levelClass = 'level-2';
            else levelClass = 'level-3';

            html += `
                <div class="word-item" data-id="${word.id}">
                    <div class="word-info">
                        <strong>${word.en}</strong>  ·  ${word.zh}
                    </div>
                    <div class="word-level ${levelClass}">等级 ${level}</div>
                    <div class="word-actions">
                        <button class="inc-level" data-id="${word.id}" data-delta="1" style="background:#e6f7e6;">▲+1</button>
                        <button class="dec-level" data-id="${word.id}" data-delta="-1" style="background:#ffe6e6;">▼-1</button>
                        <button class="delete-word" data-id="${word.id}" style="background:#fee2e2;">🗑️</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // 绑定单词升降级和删除事件
        document.querySelectorAll('.inc-level').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const wordId = btn.getAttribute('data-id');
                const currentLvl = progress[wordId] ?? 0;
                if (currentLvl < 3) {
                    progress[wordId] = currentLvl + 1;
                    saveProgressForStudent(currentStudent);
                    // 刷新关联UI
                    refreshReviewQueue();
                    renderWordList();
                    renderStats();
                    renderReviewCard();  // 若当前复习单词受影响刷新卡片
                } else {
                    alert('已经是最高等级3级掌握啦！');
                }
            });
        });
        document.querySelectorAll('.dec-level').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const wordId = btn.getAttribute('data-id');
                const currentLvl = progress[wordId] ?? 0;
                if (currentLvl > 0) {
                    progress[wordId] = currentLvl - 1;
                    saveProgressForStudent(currentStudent);
                    refreshReviewQueue();
                    renderWordList();
                    renderStats();
                    renderReviewCard();
                } else {
                    alert('已经是0级生词，无法再降级');
                }
            });
        });
        document.querySelectorAll('.delete-word').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const wordId = btn.getAttribute('data-id');
                if (confirm(`确定删除单词「${words.find(w => w.id === wordId)?.en}」吗？\n注意：两位同学的进度记录也会清除。`)) {
                    // 删除单词库中的该单词
                    words = words.filter(w => w.id !== wordId);
                    saveWords();
                    // 删除所有学生进度中该单词记录: 重新构建当前学生进度，
                    // 同时为了保持两个学生干净，同步清理localStorage里的对应字段
                    cleanWordFromAllProgress(wordId);
                    // 重新加载当前学生进度
                    loadProgressForStudent(currentStudent);
                    refreshReviewQueue();
                    renderAll();
                }
            });
        });
    }

    // 辅助：当删除单词时，同时删除A/B进度里的该单词记录
    function cleanWordFromAllProgress(wordId) {
        const progressA = localStorage.getItem(STORAGE_PROGRESS_A);
        const progressB = localStorage.getItem(STORAGE_PROGRESS_B);
        if (progressA) {
            let objA = JSON.parse(progressA);
            delete objA[wordId];
            localStorage.setItem(STORAGE_PROGRESS_A, JSON.stringify(objA));
        }
        if (progressB) {
            let objB = JSON.parse(progressB);
            delete objB[wordId];
            localStorage.setItem(STORAGE_PROGRESS_B, JSON.stringify(objB));
        }
    }

    // 统计展现
    function renderStats() {
        const total = words.length;
        let mastered = 0;
        for (let word of words) {
            if ((progress[word.id] ?? 0) === 3) mastered++;
        }
        document.getElementById('totalWords').innerText = total;
        document.getElementById('masteredCount').innerText = mastered;
    }

    // 添加新单词
    function addNewWord(en, zh) {
        if (!en.trim() || !zh.trim()) {
            alert('英文和中文都不能为空！');
            return false;
        }
        const newId = 'w' + Date.now() + Math.random().toString(36).substr(2, 6);
        const newWord = { id: newId, en: en.trim(), zh: zh.trim() };
        words.push(newWord);
        saveWords();

        // 为当前学生及另一个学生初始化进度(0)
        // 当前学生进度对象progress已存在，直接补0
        progress[newId] = 0;
        saveProgressForStudent(currentStudent);
        // 同时需要同步另一个学生的进度初始0 (保证一致性)
        const otherStudent = currentStudent === 'A' ? 'B' : 'A';
        let otherProgress = null;
        if (otherStudent === 'A') {
            otherProgress = localStorage.getItem(STORAGE_PROGRESS_A);
        } else {
            otherProgress = localStorage.getItem(STORAGE_PROGRESS_B);
        }
        let otherObj = otherProgress ? JSON.parse(otherProgress) : {};
        otherObj[newId] = 0;
        if (otherStudent === 'A') {
            localStorage.setItem(STORAGE_PROGRESS_A, JSON.stringify(otherObj));
        } else {
            localStorage.setItem(STORAGE_PROGRESS_B, JSON.stringify(otherObj));
        }

        // 刷新当前显示
        refreshReviewQueue();
        renderAll();
        return true;
    }

    // 重置当前学生全部单词等级为0
    function resetCurrentStudentProgress() {
        if (confirm(`⚠️ 确定重置同学${currentStudent}的所有单词进度吗？\n所有单词会变回0级（生词状态），递进从头开始。`)) {
            words.forEach(word => {
                progress[word.id] = 0;
            });
            saveProgressForStudent(currentStudent);
            refreshReviewQueue();
            showAnswerFlag = false;  // 重置答案显示状态
            renderAll();
        }
    }

    // 全量渲染 (卡片, 单词列表, 统计)
    function renderAll() {
        renderStats();
        renderWordList();
        renderReviewCard();
    }

    // 初始化整个应用
    function init() {
        loadWords();
        // 默认加载A学生进度
        loadProgressForStudent('A');
        currentStudent = 'A';
        // 初始化复习队列
        refreshReviewQueue();
        renderAll();

        // 绑定学生切换事件
        document.querySelectorAll('.student-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const student = btn.getAttribute('data-student');
                if (student === 'A' || student === 'B') {
                    switchStudent(student);
                    showAnswerFlag = false;   // 切换孩子重置显示
                }
            });
        });

        // 添加单词按钮
        const addBtn = document.getElementById('addWordBtn');
        if (addBtn) {
            addBtn.addEventListener('click', () => {
                const enInput = document.getElementById('newEnWord');
                const zhInput = document.getElementById('newZhWord');
                addNewWord(enInput.value, zhInput.value);
                enInput.value = '';
                zhInput.value = '';
            });
        }

        // 重置进度按钮
        const resetBtn = document.getElementById('resetCurrentStudentBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                resetCurrentStudentProgress();
            });
        }

        // 初始激活按钮样式
        document.querySelector('.student-btn[data-student="A"]').classList.add('active');
    }

    // 启动
    init();
</script>
</body>
</html>
